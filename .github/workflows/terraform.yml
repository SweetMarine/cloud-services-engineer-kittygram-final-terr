name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: Select the Terraform action
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
      TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
      TF_VAR_ssh_key: ${{ secrets.SSH_PUBLIC_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Prepare service account key
        working-directory: ./infra
        env:
          SA_KEY: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_FILE }}
        run: |
          set -euo pipefail
          printf '%s\n' "$SA_KEY" > sa_key_input.txt
          if python3 -c "import json; json.load(open('sa_key_input.txt'))" 2>/dev/null; then
            mv sa_key_input.txt authorized_key.json
          else
            base64 -d < sa_key_input.txt > authorized_key.json
            python3 -c "import json; json.load(open('authorized_key.json'))"
          fi
          rm -f sa_key_input.txt

      - name: Terraform Init
        working-directory: ./infra
        run: |
          terraform init \
            -backend-config="access_key=${ACCESS_KEY}" \
            -backend-config="secret_key=${SECRET_KEY}"
        env:
          ACCESS_KEY: ${{ secrets.ACCESS_KEY || secrets.YC_STORAGE_ACCESS_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY || secrets.YC_STORAGE_SECRET_KEY }}

      - name: Terraform Plan
        working-directory: ./infra
        if: ${{ github.event.inputs.action == 'plan' }}
        run: terraform plan

      - name: Terraform Apply
        working-directory: ./infra
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve

      - name: Print VM IP and SSH user (REMOTE_HOST, REMOTE_USER, tests.yml)
        working-directory: ./infra
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          terraform output -no-color vm_external_ip
          terraform output -no-color vm_ssh_login

      - name: Terraform Destroy
        working-directory: ./infra
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve